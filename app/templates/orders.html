<div class="order-card p-4 bg-white shadow-sm border rounded-3 mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="m-0 fw-bold">Order #{{ order.id }}</h5>
        <span class="badge {{ 'bg-success' if order.status == 'completed' else 'bg-warning' }}">
            {{ order.status }}
        </span>
    </div>
    <div class="row">
        <div class="col-md-4">
            <small class="text-muted">Date</small>
            <p class="mb-0">{{ order.created_at.strftime('%Y-%m-%d') }}</p>
        </div>
        <div class="col-md-4">
            <small class="text-muted">Total</small>
            <p class="mb-0 fw-bold text-primary">{{ "%.2f"|format(order.total) }} ₾</p>
        </div>
        <div class="col-md-4 text-md-end">
            <button class="btn btn-outline-dark btn-sm">View Details</button>
        </div>
    </div>
</div>
